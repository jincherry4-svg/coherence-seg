# 設備疊加設定：實驗室 GTX 1080 Ti（11GB, Pascal）正式訓練
# 用法：python -m src.train --config configs/m2_reorder.yaml configs/lab_1080ti.yaml
# 與 base 差異：精度（Pascal 不支援 bf16）、batch、gradient checkpointing（11GB 保守開啟）。
# max_len 沿用 base 的 2048（與論文一致）。
# 注意：Pascal 無 Tensor Core、fp16 只省記憶體不加速，訓練慢是正常的。
seed: 42
ckpt_dir: ./checkpoints      # 實驗室本地磁碟（非 Drive）
model:
  gradient_checkpointing: true   # 11GB 卡保守開啟，寧慢勿 OOM
data:
  batch_size: 1
  num_workers: 2
train:
  precision: 16-mixed
  grad_accum: 8              # 有效 batch = 1 × 8 = 8，與 base 一致
