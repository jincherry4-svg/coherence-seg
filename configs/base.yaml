# 共用設定（Colab A100）。各里程碑 config 只覆寫差異欄位。
seed: 42
ckpt_dir: /content/drive/MyDrive/LongformerSC/coherence-seg/checkpoints

flags:
  use_reorder: false        # M2+：句子挖空填回輔助任務
  use_unlabeled: false      # M3+：混入無標註資料
  use_mean_teacher: false   # M3+：EMA 教師 + 一致性損失
  unlabeled_reorder: false  # M4：無標註 batch 也計 L_reorder（M3 只走一致性）

model:
  # AllenAI 原始 Longformer 預訓練權重，經 HF transformers 的 LongformerModel 載入。
  # 不使用 allenai/longformer GitHub repo 的舊版自訂 CUDA kernel（已停止維護，
  # 且 SpokenNLP baseline 亦使用 HF 版，換載入器會破壞可比性）。
  name: allenai/longformer-base-4096
  dropout: 0.1
  # VRAM 充裕時關閉（用重算換記憶體會慢 ~30%）；1080 Ti 等 11GB 卡由設備 config 開回
  gradient_checkpointing: false

data:
  # name：資料集身分（唯一真相來源）。exp_tag 後綴、開機診斷、路徑交叉檢查都依據它。
  name: disease
  train_path: /content/data/wiki_section_disease/train.jsonl
  dev_path: /content/data/wiki_section_disease/dev.jsonl
  test_path: /content/data/wiki_section_disease/test.jsonl
  unlabeled_path: /content/data/unlabeled/wiki_unlabeled_50k.jsonl
  # 【與論文/VRAM 對齊】SpokenNLP Table 2 的 Longformer-Base 用 max_seq_length 2048。
  # 4096 的活化記憶體是 2048 的兩倍，實測 4096×bs2 吃 21GB、2048×bs1 只需約 6GB
  # （1080 Ti 11GB 可直跑）。長上下文是否有效益留作 ablation：疊加
  # configs/len4096.yaml 顯式啟用。
  max_len: 2048
  batch_size: 2
  num_workers: 2

optim:
  # 【與 SpokenNLP 附錄 B 對齊】論文用單一 lr=5e-5（encoder 與分類頭不分開），
  # batch_size=8（我們的有效 batch 已是 8，一致），dropout=0.1（已一致）。
  # 我們原設定用分層 lr（encoder 2e-5、heads 1e-4）是常見的 fine-tuning 慣例，
  # 但既然要對齊論文數字，先用單一 lr 排除變因；分層 lr 留作 ablation 比較。
  lr_encoder: 5.0e-5
  lr_heads: 5.0e-5
  weight_decay: 0.01
  warmup_ratio: 0.1

loss:
  # 【與 SpokenNLP baseline 對齊——已核對其原始碼 arguments.py】其預設
  # focal_loss_gamma=0.0（即普通 CrossEntropy）、weight_label_zero=0.5（無類別
  # 加權），run_finetune.sh 未覆寫。加權會把邊界機率整體推高造成過度切分：
  # 實測 WD/Pk 比從論文的 1.24 膨脹到 1.85+。故預設一律無加權 BCE；
  # focal/加權留作 ablation，用 configs/loss_focal.yaml 顯式疊加啟用。
  seg_type: bce             # focal | bce（預設 bce = 論文對齊）
  focal_gamma: 2.0          # 僅 seg_type: focal 時生效
  focal_alpha: 0.75         # 僅 seg_type: focal 時生效
  pos_weight: 1.0           # bce 的正類權重；1.0 = 無加權（論文對齊）
  lambda1_max: 0.5          # 重組任務權重上限（§6）
  lambda1_ramp_steps: 2000
  lambda2_max: 1.0          # 一致性損失權重上限（§6）
  lambda2_ramp_steps: 4000

curriculum:
  acc_window: 200           # 重組準確率移動平均視窗（steps）
  acc_threshold: 0.60

mean_teacher:
  max_decay: 0.999

train:
  # 【與 SpokenNLP 附錄 B 對齊】論文 WikiSection 專用 epochs=5（WIKI-727K 才是 3）。
  # patience=3 的 early stopping 仍保留，若 5 epochs 內 val/pk 沒有改善會提前停。
  epochs: 5
  precision: bf16-mixed
  grad_accum: 4             # 有效 batch = 2 × 4 = 8
  patience: 3
  ckpt_every_n_steps: 500   # §9.3 斷線防護

wandb:
  enabled: true
  project: coherence-seg
  group: default
